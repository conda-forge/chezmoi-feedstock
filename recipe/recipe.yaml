schema_version: 1

context:
  version: "2.70.3"

package:
  name: chezmoi
  version: ${{ version }}

source:
  url: https://github.com/twpayne/chezmoi/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 04780df69be596b714ac0ea5f9c65e7739adc847613d5a91ba23fd5a020f5103

build:
  number: 0

requirements:
  build:
    - ${{ compiler('go-nocgo') }}
    - go-licenses

tests:
  - script:
      content:
        # workaround https://github.com/prefix-dev/rattler-build/issues/2424
        - if: osx and x86_64
          then:
            - export HOME=${HOME:-$PWD}
        - chezmoi --help

about:
  license: MIT
  license_file:
    - LICENSE
    - license-files/
  summary: Manage your dotfiles across multiple diverse machines, securely
  homepage: https://chezmoi.io
  repository: https://github.com/twpayne/chezmoi

extra:
  recipe-maintainers:
    - anjos
    - danielnachun
